<article class="overflow-hidden rounded-[2rem] bg-[#FFF4E6] shadow-sm transition active:scale-[0.99]">
  <div class="h-32" [style.background]="imageGradient"></div>
  <div class="p-5">
    <div class="mb-4 flex items-start justify-between gap-4">
      <div>
        <p class="text-xs font-bold uppercase tracking-[0.18em] text-[#B85C38]">
          {{ category }}
        </p>
        <h3 class="mt-2 text-xl font-bold text-[#3A2A1E]">
          {{ title }}
        </h3>
        <p class="mt-2 text-sm leading-relaxed text-[#7A6048]">
          {{ description }}
        </p>
      </div>
      <span class="shrink-0 rounded-full bg-[#6F7D4F]/15 px-3 py-1 text-xs font-bold text-[#6F7D4F]">
        {{ difficulty }}
      </span>
    </div>
    <div class="flex items-center gap-3 text-sm font-semibold text-[#7A6048]">
      <span>{{ time }}</span>
      <span class="h-1 w-1 rounded-full bg-[#D9A441]"></span>
      <span>{{ servings }}</span>
    </div>
  </div>
</article>
