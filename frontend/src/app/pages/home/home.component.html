<section class="mx-auto min-h-screen max-w-md px-5 pb-28 pt-6">
  <header class="mb-6">
    <p class="text-sm font-semibold text-[#6F7D4F]">
      Bem-vindo ao
    </p>

    <h1 class="mt-1 text-4xl font-bold tracking-tight">
      À La Carte
    </h1>
  </header>

  <section class="mb-6 rounded-[2rem] bg-[#B85C38] p-5 text-white shadow-sm">
    <p class="text-sm font-medium text-white/80">
      Receita em destaque
    </p>

    <h2 class="mt-2 text-2xl font-bold leading-tight">
      Organize suas receitas com carinho
    </h2>

    <p class="mt-3 text-sm leading-relaxed text-white/85">
      Salve ingredientes, quantidades, fotos e acompanhe o preparo enquanto cozinha.
    </p>

    <button
      class="mt-5 rounded-2xl bg-white px-5 py-3 text-sm font-bold text-[#B85C38] shadow-sm active:scale-95"
      type="button"
    >
      Nova receita
    </button>
  </section>

  <section class="mb-6">
    <label class="sr-only" for="searchRecipe">
      Buscar receita
    </label>

    <div class="flex items-center gap-3 rounded-2xl bg-[#FFF4E6] px-4 py-4 shadow-sm">
      <span
        class="h-5 w-5 shrink-0 bg-[#B85C38]"
        style="
          -webkit-mask: url('assets/menu-icons/search.svg') center / contain no-repeat;
          mask: url('assets/menu-icons/search.svg') center / contain no-repeat;
        "
        aria-hidden="true"
      ></span>

      <input
        id="searchRecipe"
        class="w-full bg-transparent text-sm font-medium text-[#3A2A1E] outline-none placeholder:text-[#7A6048]/70"
        type="text"
        placeholder="Buscar receita..."
      />
    </div>
  </section>

  <section class="mb-5 flex items-center justify-between">
    <div>
      <h2 class="text-xl font-bold">
        Minhas receitas
      </h2>

      <p class="mt-1 text-sm text-[#7A6048]">
        Escolha uma receita para começar.
      </p>
    </div>

    <button
      class="rounded-full bg-[#FFF4E6] px-4 py-2 text-sm font-bold text-[#B85C38] shadow-sm active:scale-95"
      type="button"
    >
      Ver todas
    </button>
  </section>

  <section class="space-y-4">
    @for (recipe of recipes; track recipe.title) {
      <app-recipe-card
        [title]="recipe.title"
        [description]="recipe.description"
        [difficulty]="recipe.difficulty"
        [time]="recipe.time"
        [servings]="recipe.servings"
        [category]="recipe.category"
        [variant]="recipe.variant"
      ></app-recipe-card>
    }
  </section>
</section>
