<section class="mx-auto min-h-screen max-w-md px-5 pb-28 pt-6">
  <header class="mb-6">
    <p class="text-sm font-semibold text-[#6F7D4F]">
      Receitas salvas
    </p>
    <h1 class="mt-1 text-4xl font-bold tracking-tight text-[#3A2A1E]">
      Favoritas
    </h1>
    <p class="mt-3 text-sm leading-relaxed text-[#7A6048]">
      Suas receitas preferidas ficam salvas aqui para acesso rápido.
    </p>
  </header>
  @if (favoriteRecipes.length > 0) {
    <section class="space-y-4">
      @for (recipe of favoriteRecipes; track recipe.id) {
        <app-recipe-card [recipe]="recipe" (favoriteToggle)="toggleFavorite($event)"></app-recipe-card>
      }
    </section>
  } @else {
    <section class="mt-10 rounded-[2rem] border border-dashed border-[#D8C4A5] bg-[#FFF4E6] p-6 text-center shadow-sm">
      <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-3xl bg-[#B85C38]/10 text-[#B85C38]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.8 8.7c0 5.2-8.8 10.1-8.8 10.1S3.2 13.9 3.2 8.7A4.7 4.7 0 0 1 12 6.4a4.7 4.7 0 0 1 8.8 2.3z" />
        </svg>
      </div>
      <h2 class="text-xl font-black text-[#2F211A]">
        Nenhuma favorita ainda
      </h2>
      <p class="mt-2 text-sm leading-relaxed text-[#7A6048]">
        Toque no coração vazio de uma receita para salvar ela nesta aba.
      </p>
      <a routerLink="/receitas" class="mt-5 inline-flex rounded-2xl bg-[#B85C38] px-5 py-3 text-sm font-bold text-white active:scale-[0.98]">
        Ver receitas
      </a>
    </section>
  }
</section>
